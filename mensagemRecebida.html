    .card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
      border: 1px solid rgba(0, 0, 0, 0.05);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
    }

    .card:nth-child(2n)::before {
      background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
    }

    .card:nth-child(3n)::before {
      background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
    }

    .card:nth-child(4n)::before {
      background: linear-gradient(90deg, #43e97b 0%, #38f9d7 100%);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    .card h3 {
      font-size: 1.25rem;
      margin-bottom: 12px;
      color: #1a202c;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;

    .card p {

      line-height: 1.6;

      font-size: 0.95rem;
    }

    .card p strong {
      color: #2d3748;
      font-weight: 600;
    }

    .card p:last-child {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
      color: #2d3748;
      font-style: italic;
    }

    @media (max-width: 768px) {

    @keyframes fadeIn {

  <script>
    const supabaseUrl = "https://cdhjzkmlucahtllfpdlx.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkaGp6a21sdWNhaHRsbGZwZGx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDgxNzMsImV4cCI6MjA5MDgyNDE3M30.ZaP_y-A2t32z8FRT4vAA8xsMqjhsdA0QuQIGTP5f36g";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function carregarComentarios() {

        const { data, error } = await supabaseClient
            .from("comentarios")
            .select("*")
            .order("id", { ascending: false });

        if (error) {
            console.log(error);
            return;
        }

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        data.forEach(item => {
            const div = document.createElement("div");
            div.classList.add("card");

            div.innerHTML = `
                <h3>${item.nome} ${item.sobrenome}</h3>
                <p><strong>Email:</strong> ${item.email}</p>
                <p>${item.msg}</p>
            `;

            lista.appendChild(div);
        });
    }

    carregarComentarios();
  </script>

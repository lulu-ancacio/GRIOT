  <script>
    const supabaseUrl = "https://cdhjzkmlucahtllfpdlx.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkaGp6a21sdWNhaHRsbGZwZGx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDgxNzMsImV4cCI6MjA5MDgyNDE3M30.ZaP_y-A2t32z8FRT4vAA8xsMqjhsdA0QuQIGTP5f36g";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function carregarComentarios() {

        const { data, error } = await supabaseClient
            .from("comentarios")
            .select("*")
            .order("id", { ascending: false });

        if (error) {
            console.log(error);
            return;
        }

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

       data.forEach(item => {
    const div = document.createElement("div");
    div.classList.add("card");

    const assunto = encodeURIComponent("Resposta ao seu comentário - Equipe GRIOT");
    const mensagem = encodeURIComponent(`Olá ${item.nome},

Você escreveu:
${item.msg}

Resposta:
`);

    const linkEmail = `mailto:${item.email}?subject=${assunto}&body=${mensagem}`;

    div.innerHTML = `
        <h3><strong>Nome:</strong> ${item.nome} ${item.sobrenome}</h3>

        <p><strong>Mensagem:</strong> ${item.msg}</p>

        <p class="enderecoOnline">
            <strong>Email:</strong> 
            <a href="${linkEmail}">
                ${item.email}
            </a>
        </p>
    `;

    lista.appendChild(div);
});
    }

    carregarComentarios();
  </script>
